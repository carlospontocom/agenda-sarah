<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="styles.css">
  <title>Agenda de Reabilitação - SARAH</title>
</head>

<body>

  <header>
    <nav class="navbar container">
      <a href="#" class="nav-link active">Home</a>
      <a href="#" class="nav-link">Paciente</a>
      <a href="#" class="nav-link">Agenda do Dia</a>
      <a href="#" class="nav-link">Próximas Atividades</a>
    </nav>
  </header>

  <main class="main">
    <div class="container">

      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar por serviços" class="field" autocomplete="off">
      </div>

      <div class="cards" id="servicesGrid">
        <div class="card-services" data-service-name="Terapia Ocupacional">
          <span class="material-symbols-outlined">work_history</span>
          <p>Terapia Ocupacional</p>
        </div>

        <div class="card-services" data-service-name="Fisioterapia Esportiva">
          <span class="material-symbols-outlined">sports_gymnastics</span>
          <p>Fisioterapia Esportiva</p>
        </div>

        <div class="card-services" data-service-name="Nutrição">
          <span class="material-symbols-outlined">nutrition</span>
          <p>Nutrição</p>
        </div>

        <div class="card-services" data-service-name="Psicologia do Esporte">
          <span class="material-symbols-outlined">psychology</span>
          <p>Psicologia do Esporte</p>
        </div>
      </div>

      <div id="noResultsMessage" class="no-results hidden">
        Serviços não encontrados
      </div>

    </div>
  </main>

  <script src="script.js"></script>

</body>
</html>
